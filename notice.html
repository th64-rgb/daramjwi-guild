  <div class="max-w-screen-xl mx-auto px-5 py-8">

      <p class="text-slate-500 mb-6">길드원 전용 공지사항</p>

      <div class="space-y-4">
        <div class="bg-white border rounded-3xl p-5">
          <div class="flex justify-between mb-1">
            <span class="font-bold">[공지] 6월 길드 레이드 일정</span>
            <span class="text-xs text-slate-400">2026.06.19</span>
          </div>
          <div class="text-sm text-slate-600">
            6월 21일(토) 저녁 8시 길드 레이드 진행합니다.<br>
            참여 필수이며 결석 시 미리 길드장에게 말씀해주세요.
          </div>
        </div>

        <div class="bg-white border rounded-3xl p-5">
          <div class="flex justify-between mb-1">

          </div>
        </div>

          <div class="flex justify-between mb-1">
            <span class="font-bold">[이벤트] 신규 길드원 환영 이벤트</span>
            <span class="text-xs text-slate-400">2026.06.15</span>
          </div>
          <div class="text-sm text-slate-600">
            6월 한 달 동안 가입한 모든 길드원에게 길드 창고에서 회복 아이템을 지급합니다.
          </div>
        </div>
      </div>

      <div class="mt-8 text-xs text-center text-slate-400">
        로그인한 길드원만 확인 가능한 내부 공지입니다.
